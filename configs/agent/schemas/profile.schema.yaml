# Profile Schema
# Validates agent profile YAML documents

type: object
required:
  - name
  - agent_id
  - scenario_id
  - context
  - knowledge_profile
  - disposition
  - description
  - expected_flaws
  - metadata

properties:
  name:
    type: string

  agent_id:
    type: string
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"    # kebab-case

  scenario_id:
    type: string
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"

  context:
    type: string

  knowledge_profile:
    type: object
    properties:
      strong_understanding:
        type: array
        items:
          type: object
          required: [area]
          properties:
            area:
              type: string
            detail:
              type: string
      shallow_understanding:
        type: array
        items:
          type: object
          required: [area]
          properties:
            area:
              type: string
            detail:
              type: string
      misconceptions:
        type: array
        items:
          type: object
          required: [area]
          properties:
            area:
              type: string
            detail:
              type: string
      blind_spots:
        type: array
        items:
          type: object
          required: [area]
          properties:
            area:
              type: string
            detail:
              type: string

  disposition:
    type: object
    required: [confidence, engagement_style, expressiveness, reactive_tendency]
    properties:
      confidence:
        type: string
        enum: [low, moderate, high]
      engagement_style:
        type: string
        enum: [collaborative, moderate, competitive]
      expressiveness:
        type: string
        enum: [restrained, moderate, expressive]
      reactive_tendency:
        type: string

  description:
    type: string

  expected_flaws:
    type: array
    items:
      type: object
      required: [flaw, flaw_type, mechanism]
      properties:
        flaw:
          type: string
        flaw_type:
          type: string
          enum: [reasoning, epistemic, completeness, coherence]
        mechanism:
          type: string

  metadata:
    type: object
    required: [version, created_at, derived_from]
    properties:
      version:
        type: string
      created_at:
        type: string
        format: date-time
      derived_from:
        type: string
