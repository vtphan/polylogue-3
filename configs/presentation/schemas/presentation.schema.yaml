# Presentation Transcript Schema
# Validates presentation transcript YAML documents

type: object
required:
  - scenario_id
  - topic
  - activity
  - created_at
  - agents
  - sections

properties:
  scenario_id:
    type: string
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"

  topic:
    type: string

  grade_band:
    type: string
    enum: ["6", "7", "8"]

  activity:
    type: string
    enum: [presentation]

  created_at:
    type: string
    format: date-time

  agents:
    type: array
    items:
      type: object
      required: [agent_id, name, role]
      properties:
        agent_id:
          type: string
        name:
          type: string
        role:
          type: string

  sections:
    type: array
    items:
      type: object
      required: [section_id, section, speaker, role, content, metadata, added_at]
      properties:
        section_id:
          type: string
          pattern: "^section_\\d{2}$"
        section:
          type: string
          enum: [introduction, approach, findings, solution, conclusion]
        speaker:
          type: string
        role:
          type: string
        content:
          type: string
        metadata:
          type: object
          required: [knowledge_areas_engaged, rationale]
          properties:
            knowledge_areas_engaged:
              type: array
              items:
                type: object
                required: [area, category]
                properties:
                  area:
                    type: string
                  category:
                    type: string
                    enum: [strong, shallow, misconception, blind_spot]
            rationale:
              type: string
        added_at:
          type: string
          format: date-time
