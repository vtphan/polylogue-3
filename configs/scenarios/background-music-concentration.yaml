scenario_id: background-music-concentration
created_at: "2026-03-25T00:00:00Z"

topic:
  driving_question: "How does background music affect concentration and test performance in middle school students?"
  domain: "Cognitive science / Experimental design / Sensory processing"
  description: >
    This project investigates how different auditory environments — background music, silence,
    and white noise — affect cognitive performance on memory and math tasks. The team designed
    and conducted an experiment testing classmates under three sound conditions, collected data
    on accuracy and speed, and performed proportional analysis to compare results. Their final
    product is a digital presentation of findings and a prototype recommendation for an optimal
    study environment.

context:
  level: specific
  description: >
    7th grade STEM PBL at the University Middle School (UMS) in Memphis. Driving question:
    How do our senses influence our actions and decisions, both now and in the future? This
    group is investigating how auditory input (background music, silence, white noise) affects
    cognitive performance. They designed an experiment testing classmates' performance on memory
    and math tasks under different sound conditions, collected data on accuracy and speed, and
    are presenting their findings including proportional analysis of results. Final product is
    a digital presentation and prototype of a study environment.

activity: presentation

agents:
  - name: Amara
    role: Experiment Designer
    knowledge_focus: >
      Amara led the design of the experiment and can describe the three conditions (music,
      silence, white noise), the tasks used (memory recall and timed math), and the basic
      procedure. She has a strong grasp of the practical logistics — how they set up testing
      stations, managed timing, and kept noise levels consistent between groups. However, she
      holds a misconception that simply having three different conditions makes their experiment
      "controlled," without understanding that a controlled experiment requires isolating the
      independent variable by holding all other factors constant. She does not recognize that
      factors like time of day, student fatigue, task familiarity, and test difficulty across
      conditions are confounding variables that should have been addressed. She also has a
      blind spot on the difference between random assignment and convenience sampling — they
      let students choose their testing slot, but she treats this as equivalent to proper
      randomization.
    disposition_sketch: >
      High confidence, moderate engagement. Amara speaks with authority about the experiment
      and presents design choices as well-reasoned, making her misconception about experimental
      control sound like methodological rigor.
    expected_flaws:
      - flaw: "Causal oversimplification — attributing performance differences solely to sound condition"
        flaw_type: reasoning
        mechanism: >
          Misconception about what makes an experiment controlled leads Amara to claim that
          any difference in test scores between conditions was caused by the sound environment
          alone. She skips the logical step of ruling out confounding variables (fatigue, time
          of day, task difficulty differences, self-selection bias) and presents a simplified
          causal chain: different sound led to different scores, therefore sound caused the
          difference.
      - flaw: "No feasibility analysis of the experimental design's limitations"
        flaw_type: completeness
        mechanism: >
          Blind spot on convenience sampling and self-selection bias means Amara does not
          address whether their method of letting students choose testing slots introduced
          systematic differences between groups. She presents the design as if it were
          rigorous without analyzing whether it was actually feasible to draw the conclusions
          they claim from it.

  - name: DeShawn
    role: Data Analyst
    knowledge_focus: >
      DeShawn handled the data collection and analysis, and he can accurately report the
      numbers — average accuracy percentages and speed measurements for each condition. He
      understands how to calculate proportions and present them as percentages. However, his
      understanding of what these numbers mean statistically is shallow. He does not grasp
      that small differences in averages (e.g., 72% vs. 68% accuracy) may not be meaningful
      with a small sample size, and he treats any numerical difference as significant. He has
      a blind spot on variability within conditions — he reports averages without considering
      the spread of scores, so he does not realize that the ranges within each condition may
      overlap heavily, undermining the between-condition comparisons.
    disposition_sketch: >
      Moderate confidence, restrained and numbers-focused. DeShawn leans heavily on citing
      exact percentages and averages, which gives his claims an air of precision even when
      the conclusions he draws from those numbers are not warranted.
    expected_flaws:
      - flaw: "Overgeneralization from small numerical differences"
        flaw_type: reasoning
        mechanism: >
          Shallow understanding of statistical significance leads DeShawn to treat small
          percentage-point differences between conditions as definitive evidence that one
          sound environment is better than another. He generalizes from narrow differences
          in a small sample to broad claims about how sound affects performance, without
          acknowledging that the differences may be due to chance.
      - flaw: "Missing qualifications on sample size and variability"
        flaw_type: completeness
        mechanism: >
          Blind spot on within-condition variability means DeShawn never mentions how spread
          out the scores were within each group. He reports averages as if they tell the whole
          story, omitting the qualification that high variability within conditions weakens the
          comparison between conditions. He also does not flag the small sample size as a
          limitation of their findings.

  - name: Priya
    role: Background Researcher
    knowledge_focus: >
      Priya researched the science behind how sound affects the brain and can reference the
      Mozart Effect and studies about music and studying. She has a strong understanding that
      the topic is debated in the scientific community and that not all researchers agree.
      However, she holds a misconception that the Mozart Effect has been reliably proven —
      she believes listening to classical music directly boosts cognitive ability, when the
      original study showed only a brief, narrow improvement in spatial reasoning that has
      not been consistently replicated. She treats popular reporting of the Mozart Effect as
      equivalent to the actual research findings. She also has a blind spot on research that
      shows music can be detrimental to tasks requiring verbal processing or reading
      comprehension, since her research focused on studies about math and spatial tasks.
    disposition_sketch: >
      Moderate confidence, expressive and story-driven. Priya uses engaging examples and
      references to well-known studies, which makes her misconception about the Mozart Effect
      sound well-supported and her selective coverage of the literature feel comprehensive.
    expected_flaws:
      - flaw: "Circular reasoning about music and cognitive performance"
        flaw_type: reasoning
        mechanism: >
          Misconception about the Mozart Effect leads Priya to circular arguments: she claims
          music improves concentration because it activates the brain, and the brain is
          activated because music improves concentration. She restates the claim in different
          words rather than explaining the underlying cognitive mechanism — arousal regulation,
          mood modulation, or attentional load — that would constitute an actual explanation.
      - flaw: "Missing counterexamples from verbal-task research"
        flaw_type: completeness
        mechanism: >
          Blind spot on research showing that background music with lyrics impairs verbal
          processing and reading comprehension means Priya does not present evidence that
          challenges the group's general framing. Since their experiment included memory tasks
          (which involve verbal encoding), the omission of this contradictory evidence leaves
          a significant gap in the literature review.
      - flaw: "Assumption as fact about the Mozart Effect"
        flaw_type: epistemic
        mechanism: >
          Priya treats the Mozart Effect as a well-established scientific finding rather than
          a contested claim with limited replication. She presents popular media accounts of
          the effect as equivalent to peer-reviewed evidence, treating her assumption as
          established fact.

  - name: Jordan
    role: Solutions Designer and Synthesizer
    knowledge_focus: >
      Jordan is responsible for pulling the team's work together into a recommendation for an
      optimal study environment and wrapping up the presentation. He understands the team's
      data at a surface level and can describe what each team member found. However, his
      understanding of how experimental findings translate into practical recommendations is
      shallow — he jumps from "silence scored slightly higher on math tasks" to "students
      should always study in silence" without considering individual differences, task type,
      or the limitations the data carries. He has a blind spot on implementation tradeoffs —
      he does not consider whether a "silent study environment" recommendation is practical
      in a real middle school (hallway noise, shared spaces, students who find silence
      uncomfortable), nor does he address what students who performed better with music
      should do.
    disposition_sketch: >
      High confidence, collaborative and upbeat. Jordan frames everything positively and
      ties the presentation together with enthusiasm, which papers over gaps between what
      the data actually shows and what the team concludes.
    expected_flaws:
      - flaw: "Overgeneralization from one condition's marginal advantage to a universal recommendation"
        flaw_type: reasoning
        mechanism: >
          Shallow understanding of how findings translate to recommendations leads Jordan
          to generalize from a small, condition-specific advantage in their data to a blanket
          study recommendation for all students. He does not account for individual differences
          in how students respond to sound, the type of task being performed, or the narrow
          conditions under which their data was collected.
      - flaw: "Unaddressed tradeoffs in the study environment recommendation"
        flaw_type: completeness
        mechanism: >
          Blind spot on practical implementation means Jordan does not acknowledge that their
          recommended study environment has tradeoffs — silence may not be achievable in shared
          school spaces, some students may concentrate better with background sound, and the
          recommendation does not account for students whose data went against the trend. He
          presents the recommendation as straightforward without noting what is lost or
          complicated by following it.
      - flaw: "Ignored constraints on implementing the recommendation in a real school"
        flaw_type: completeness
        mechanism: >
          Jordan does not consider the practical constraints of a middle school environment —
          noise from hallways, limited quiet spaces, varying class schedules, students who
          share study areas. His prototype of an optimal study environment assumes conditions
          that may not exist in the setting where students would actually use it.

notes: >
  This scenario emphasizes reasoning and completeness flaws for a presentation activity.
  Reasoning flaws are distributed across all four agents: Amara contributes causal
  oversimplification from her misconception about experimental control; DeShawn contributes
  overgeneralization from shallow statistical understanding; Priya contributes circular
  reasoning from her misconception about the Mozart Effect; and Jordan contributes
  overgeneralization when translating findings into recommendations. Completeness flaws
  are concentrated in DeShawn (missing qualifications on sample size and variability),
  Priya (missing counterexamples from verbal-task research), Jordan (unaddressed tradeoffs
  and ignored constraints in the study environment recommendation), and Amara (no feasibility
  analysis of the experimental design).

  Priya carries one epistemic flaw (assumption as fact about the Mozart Effect) as a
  secondary emphasis. This is a natural consequence of her misconception and gives evaluating
  students additional practice if they catch it, but epistemic flaws are not the primary
  pedagogical target.

  The connector pattern is implemented through Jordan, who covers the Solution and Conclusion
  sections. His shallow synthesis skills and blind spot on implementation tradeoffs create
  conditions for completeness flaws in the sections that pull the team's work together. His
  tendency to overgeneralize also creates a reasoning flaw in the conclusion that goes beyond
  what the data supports.

  Priya provides the strongest conceptual grounding — she knows the topic is scientifically
  debated, which contrasts with Amara's confident but flawed methodology claims and DeShawn's
  precise but unqualified numbers. This gives students a range of flaw expression styles to
  evaluate: Amara sounds rigorous but oversimplifies causation, DeShawn sounds precise but
  draws unwarranted conclusions from numbers, Priya sounds well-researched but relies on a
  misconception and omits contradictory evidence, and Jordan sounds enthusiastic but glosses
  over practical limitations.

  Presentation section assignments: Amara covers Approach (experiment design and methods),
  DeShawn covers Findings (data and proportional analysis), Priya covers Introduction
  (framing the question and background research), and Jordan covers Solution and Conclusion
  (study environment prototype and synthesis). Agent isolation ensures that Jordan cannot
  see what Amara and DeShawn actually presented when he writes his synthesis, creating natural
  conditions for any coherence flaws that emerge as a secondary effect.
