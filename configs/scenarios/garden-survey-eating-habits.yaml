scenario_id: garden-survey-eating-habits
grade_band: "7"
created_at: "2026-03-28T00:00:00Z"

topic:
  driving_question: "Did our school garden actually make students eat healthier this semester?"
  domain: "Life Science / Nutrition / Research Methods"
  description: >
    A group of 7th graders is reviewing whether their school garden project changed student eating
    habits. They administered a survey at the start and end of the semester and found that more
    students said they "like vegetables" in the second survey. The group is ready to claim the
    garden worked, but several confounding factors and methodological issues complicate that
    conclusion — a new salad bar was introduced mid-semester, and the survey questions were worded
    differently each time.

context:
  level: specific
  description: >
    7th grade STEM PBL. A group of 4 students is reviewing whether their school garden project
    changed eating habits. They gave a survey at the start and end of the semester. More students
    said they "like vegetables" in the second survey. One student concludes the garden worked.
    Another points out that the cafeteria also started a new salad bar mid-semester, but the group
    dismisses this quickly — "the garden is what we worked on, so that's probably what made the
    difference." A third student notices the survey questions were worded differently each time but
    isn't sure if that matters. They are heading toward claiming the garden improved eating habits
    based on the survey shift alone.

activity: discussion

agents:
  - name: Nadia
    role: Lead Researcher
    knowledge_focus: >
      Nadia designed the survey and collected the data. She holds a causal misconception: she
      believes that because students interacted with the garden (planting, watering, harvesting)
      and then reported liking vegetables more, the garden experience directly caused the attitude
      change. She reasons that hands-on experience with growing food creates a personal connection
      that changes preferences — which has some truth as a hypothesis, but she treats it as a
      proven mechanism rather than one possible explanation among several. She has strong
      understanding of the survey results themselves (the numbers, who responded, the percentage
      shift) but does not understand that correlation between two events in time does not establish
      that one caused the other. She has a blind spot on confounding variables — she has not
      considered that the salad bar, seasonal availability of produce, or simply growing older
      could also explain the shift.
    disposition_sketch: >
      High confidence, competitive. Proud of the research she led and presents the survey numbers
      with authority. When challenged, she defends the causal link by repeating the hands-on
      experience argument with increasing certainty rather than considering alternatives.
    expected_flaws:
      - flaw: "Causal misconception — the garden experience directly caused students to like vegetables more"
        flaw_type: reasoning
        mechanism: >
          Nadia believes that because students participated in the garden and then reported liking
          vegetables more, the garden caused the change. This is a mechanistic causal error typical
          of 7th grade: she has a plausible-sounding mechanism (hands-on experience creates
          connection) but treats it as the only explanation without ruling out alternatives. When
          Ravi raises the salad bar as a confound, Nadia will defend her causal claim by repeating
          that the garden gave students a personal connection to food, producing circular reasoning
          and missing-premise dismissals. The causal misconception generates reasoning flaws when
          defended in debate.
      - flaw: "Selective evidence — focusing only on the survey shift that supports the garden's impact"
        flaw_type: epistemic
        mechanism: >
          Nadia presents the survey percentage increase as clear evidence the garden worked, without
          mentioning that she does not know how many students actually ate more vegetables (as
          opposed to just saying they like them more), whether the same students took both surveys,
          or that the cafeteria introduced a salad bar during the same period. She selects the
          evidence that supports her conclusion and does not acknowledge evidence that complicates
          it.

  - name: Ravi
    role: Data Analyst
    knowledge_focus: >
      Ravi helped tabulate the survey results and noticed that the cafeteria started a new salad
      bar mid-semester. He has genuine analytical strength: he understands that if two things
      changed at the same time, you cannot be sure which one caused the outcome. He can articulate
      "but the salad bar also started, so how do we know it was the garden?" However, he has
      shallow understanding of how to actually resolve a confounding variable — he knows it is a
      problem but not what you would do about it (control groups, pre/post comparison of salad bar
      users vs. non-users, etc.). He also has a blind spot on survey methodology: he did not
      notice that the survey questions were worded differently and does not think about response
      rates or sample representativeness.
    disposition_sketch: >
      Low confidence, collaborative. Raises the salad bar concern tentatively with "I was just
      wondering..." phrasing. When the group pushes back, he tends to concede rather than press
      the point, even when his concern is valid.
    expected_flaws:
      - flaw: "Abandonment — drops the valid confounding variable concern under group pressure"
        flaw_type: completeness
        mechanism: >
          Ravi raises a legitimate methodological concern (the salad bar as a confounding variable)
          but abandons it when Nadia and the group dismiss it with "the garden is what we worked
          on." His low confidence and collaborative disposition make him susceptible to conformity
          pressure. The valid concern is lost, leaving the group's causal claim unchallenged and
          their analysis incomplete. This is an interaction-driven completeness flaw — a missing
          counterexample that was raised but not pursued.
      - flaw: "Shallow resolution — knows the confound is a problem but cannot propose how to address it"
        flaw_type: reasoning
        mechanism: >
          Even when Ravi raises the salad bar concern, he cannot explain what the group should do
          about it. He has a missing premise: he jumps from "there's a confound" to an implicit
          "so maybe we can't say anything" without articulating what kind of evidence or analysis
          would actually let them separate the garden's effect from the salad bar's effect. This
          makes his objection easy to dismiss because he cannot offer a constructive alternative.

  - name: Imani
    role: Survey Designer
    knowledge_focus: >
      Imani helped write the survey questions and noticed that the pre-survey asked "Do you like
      eating vegetables?" while the post-survey asked "Do you enjoy trying fresh vegetables from
      the garden?" She senses something is off but has shallow understanding of why survey wording
      matters. She knows the questions are "kind of different" but cannot articulate that the
      post-survey question is leading (it mentions the garden and uses "fresh" and "trying" which
      are more positive framings) and that comparing answers to differently worded questions is
      methodologically invalid. She has a blind spot on response bias — she does not consider that
      students might answer more positively on the post-survey because they know the garden group
      wants to hear good news (social desirability bias). She has strong understanding of the
      logistics of survey distribution — she knows exactly how many students received each survey
      and when.
    disposition_sketch: >
      Moderate confidence, restrained. Brings up the wording difference as an observation rather
      than a concern — "I just noticed the questions were a little different." When the group does
      not engage with it, she moves on rather than pushing. Prefers data and specifics over
      general claims.
    expected_flaws:
      - flaw: "Unacknowledged uncertainty — notices the survey wording changed but does not understand or flag why it matters"
        flaw_type: epistemic
        mechanism: >
          Imani observes the wording difference but lacks the methodological knowledge to explain
          why comparing responses to differently worded questions is invalid. She presents it as a
          curiosity ("the questions were kind of different") rather than as a threat to the study's
          validity. The uncertainty about what the survey data actually measures goes
          unacknowledged because Imani herself does not grasp the implications of her own
          observation. This is a 7th-grade epistemic flaw: she can see the surface anomaly but
          cannot connect it to the deeper methodological problem.
      - flaw: "Assumption as fact — treating survey responses as a direct measure of eating behavior"
        flaw_type: epistemic
        mechanism: >
          Imani, like the rest of the group, treats "students said they like vegetables more" as
          equivalent to "students eat healthier." She does not distinguish between self-reported
          attitudes and actual behavior change. This assumption is never examined — the group
          collectively takes survey responses at face value as proof of dietary change without
          acknowledging the gap between what people say and what they do.

  - name: Mateo
    role: Project Coordinator
    knowledge_focus: >
      Mateo managed the garden schedule and is responsible for pulling the group's findings
      together into a final claim. He has strong understanding of what the group actually did
      during the semester — the planting timeline, which classes visited the garden, how many
      harvest events happened. But he has shallow understanding of how to connect project
      activities to research evidence. He tends to reason that because the group worked hard on
      the garden, the garden must have had an effect — confusing effort with impact. He has a
      blind spot on what a valid research conclusion requires: he does not think about whether
      their study design (two surveys, no control group, confounding variables) can support the
      causal claim they want to make. He genuinely wants the group to have a strong finding for
      the STRIPES Showcase and sees his role as making sure they land on a clear message.
    disposition_sketch: >
      Moderate confidence, expressive. Talks about the project in narrative terms — "we planted,
      we grew, we saw the change." Frames the semester as a story with the survey results as the
      happy ending. When concerns are raised, he redirects toward the positive narrative rather
      than engaging with the methodological issues.
    expected_flaws:
      - flaw: "Conclusion overreach — claiming the garden improved eating habits based on insufficient evidence"
        flaw_type: coherence
        mechanism: >
          Mateo tries to synthesize the group's work into a final claim ("the garden improved
          student eating habits") that goes beyond what their evidence supports. The survey has
          confounding variables, differently worded questions, and measures attitudes rather than
          behavior — but Mateo's conclusion treats it as a clean cause-and-effect finding. This
          is a coherence flaw because the conclusion does not follow from the evidence the group
          actually has. His narrative framing (effort in → results out) papers over the gaps.
      - flaw: "Overstating evidence — treating the survey percentage shift as proof the garden worked"
        flaw_type: epistemic
        mechanism: >
          Mateo presents the survey shift (more students saying they like vegetables) as strong
          evidence that the garden changed eating habits. He overstates what a simple pre/post
          survey comparison can show, especially one with no control group and changed wording.
          He may say things like "the numbers clearly show" or "our data proves" when the data
          supports, at most, a tentative observation.
      - flaw: "Missing premise — effort and intention treated as evidence of impact"
        flaw_type: reasoning
        mechanism: >
          Mateo implicitly reasons that because the group invested significant effort in the garden
          project, the garden must have produced the observed change. He skips the premise that
          effort does not guarantee impact — the garden could have been well-executed and still not
          be the cause of the survey shift. This missing premise makes his narrative compelling but
          logically incomplete.

notes: >
  Four agents for a 7th-grade discussion about whether a school garden project caused students to
  eat healthier, based on pre/post survey data with multiple methodological problems.

  Flaw emphasis is reasoning (4 instances: causal misconception from Nadia, missing premise from
  Mateo, shallow resolution from Ravi, and the causal defense pattern when Nadia is challenged)
  and epistemic (5 instances: selective evidence from Nadia, unacknowledged uncertainty and
  assumption-as-fact from Imani, overstating evidence from Mateo, and the group-wide conflation
  of survey attitudes with eating behavior). Completeness (1 instance: Ravi's abandonment of the
  confounding variable concern) and coherence (1 instance: Mateo's conclusion overreach) ensure
  all four flaw types are covered, with reasoning and epistemic carrying the emphasis.

  Nadia holds the causal misconception (garden experience directly caused attitude change) that
  drives reasoning flaws when defended. She is the primary engine for reasoning flaws because her
  high confidence and competitive disposition mean she will actively argue for the causal link
  when Ravi challenges it. Ravi has genuine analytical insight (the salad bar confound) but lacks
  the confidence and methodological depth to sustain his challenge — his abandonment is the
  primary completeness flaw. Imani has the closest thing to a methodological observation (the
  wording changed) but cannot connect it to validity, producing epistemic flaws through
  unacknowledged uncertainty. Mateo's narrative framing and desire for a strong showcase finding
  produce the coherence flaw — he wraps a weak evidence base in a compelling story.

  Interaction-driven flaw predictions: Nadia's competitive disposition and high confidence will
  likely trigger escalation when Ravi raises the salad bar confound, producing circular reasoning
  as she repeats the hands-on experience argument. Ravi's low confidence and collaborative style
  will likely trigger conformity or abandonment — he will drop his valid concern when Nadia pushes
  back and Mateo redirects to the positive narrative. Imani's restrained style means her wording
  observation may trigger abandonment as well — she raises it once, the group does not engage, and
  it disappears. Mateo's expressive, narrative-driven disposition is the engine for superficial
  consensus during converging: he will frame the group's conclusion in a way that sounds resolved
  but papers over every unaddressed concern.

  All flaws are calibrated for 7th-grade detection: they involve process-based and mechanistic
  reasoning (confounding variables, survey validity, correlation vs. causation) rather than purely
  concrete observations (6th grade) or abstract methodological critique (8th grade). Students
  should be able to catch them by comparing claims to evidence and asking "but how do we know it
  was the garden and not something else?"
