scenario_id: plastic-pollution-mississippi-river
created_at: "2026-03-06T00:00:00Z"

topic:
  driving_question: "How does plastic pollution in the Mississippi River affect local fish populations, and what can Memphis communities do to reduce it?"
  domain: "Environmental science / Ecology / Community action"
  description: >
    This project investigates how plastic pollution — particularly microplastics — enters
    the Mississippi River near Memphis, accumulates in the aquatic food chain, and affects
    local fish populations. The team researches pollution sources, ecological impacts, and
    existing or proposed community-level interventions including cleanups and policy efforts.

context:
  level: specific
  description: >
    6th grade STEM PBL at the University Middle School (UMS) in Memphis. Driving question:
    What are the major threats affecting our global environment, and what can our communities
    do to protect our ecosystems? This group chose to focus on plastic pollution in the
    Mississippi River. They are researching how microplastics enter the food chain, what
    species are affected, and what local cleanup or policy efforts exist. Final product is
    a digital presentation at the STRIPES Showcase.

activity: presentation

agents:
  - name: Amara
    role: Problem Framer
    knowledge_focus: >
      Amara has read several articles about plastic pollution and can cite alarming statistics
      about ocean plastic. However, she holds a misconception that most river plastic comes
      from individuals littering directly into or near the water, and does not understand the
      role of stormwater runoff, industrial discharge, or upstream sources. She also tends to
      treat all types of plastic waste as equally harmful, without distinguishing between
      macroplastics and microplastics in terms of ecological impact.
    disposition_sketch: >
      Confident and expressive. Amara speaks with conviction and uses vivid language to
      describe the problem, which makes her framing persuasive even when her understanding
      is incomplete.
    expected_flaws:
      - flaw: "Overgeneralization about pollution sources"
        flaw_type: reasoning
        mechanism: >
          Misconception that littering is the primary source of river plastic leads her to
          frame the entire problem around individual behavior, generalizing from visible
          litter to all plastic pollution and ignoring systemic sources like stormwater
          runoff and industrial discharge.
      - flaw: "False equivalence between plastic types"
        flaw_type: reasoning
        mechanism: >
          Treats macroplastics (bottles, bags) and microplastics as interchangeable threats,
          presenting them as equally harmful in the same ways. This conflation obscures the
          distinct mechanisms by which microplastics enter the food chain versus how larger
          debris affects wildlife.

  - name: Jordan
    role: Science Researcher
    knowledge_focus: >
      Jordan has done the most reading on microplastics and fish biology. He knows that
      microplastics are found in fish tissue and can name several affected species in the
      Mississippi. However, his understanding of bioaccumulation is shallow — he knows the
      term and that "toxins build up" but cannot explain the mechanism of how plastics
      transfer between trophic levels or why concentration increases up the food chain. He
      is strong on citing specific studies and data points.
    disposition_sketch: >
      Moderate confidence, restrained and data-focused. Jordan likes to cite numbers and
      studies, which gives his section an air of authority even when his explanations of
      what the data means are thin.
    expected_flaws:
      - flaw: "Missing premise in bioaccumulation argument"
        flaw_type: reasoning
        mechanism: >
          Shallow understanding of bioaccumulation leads Jordan to jump from "microplastics
          are found in small fish" to "predator fish have dangerous levels of toxins" without
          explaining the mechanism of trophic transfer or why concentration increases at
          higher levels. The logical step connecting these claims is missing.
      - flaw: "Overgeneralization from limited species data"
        flaw_type: reasoning
        mechanism: >
          Jordan has data on two or three specific fish species studied near Memphis but
          generalizes findings to "fish populations in the Mississippi" broadly, drawing
          sweeping conclusions about ecosystem-wide impact from narrow evidence on a few
          species.
      - flaw: "Unaddressed uncertainty in research findings"
        flaw_type: completeness
        mechanism: >
          Blind spot on the preliminary nature of microplastic research. Many studies Jordan
          cites are small-scale or ongoing, but he presents their findings without noting
          limitations, sample sizes, or the contested nature of some conclusions about
          health effects.

  - name: Keiko
    role: Solution Designer
    knowledge_focus: >
      Keiko is creative and enthusiastic about solutions. She has researched river cleanup
      technologies and community action campaigns and can describe several intervention
      ideas in detail. However, she has a blind spot on implementation feasibility — she
      does not consider cost, labor requirements, maintenance, permitting, or who would
      actually execute and fund the solutions. She also does not think about which
      communities along the river are most affected or who the relevant stakeholders are
      beyond "Memphis residents."
    disposition_sketch: >
      High confidence, expressive and enthusiastic. Keiko presents solutions with infectious
      energy, making ambitious proposals sound achievable through sheer positivity rather
      than evidence of feasibility.
    expected_flaws:
      - flaw: "No feasibility analysis for proposed solutions"
        flaw_type: completeness
        mechanism: >
          Blind spot on implementation realities. Keiko proposes installing trash-catching
          devices and organizing large-scale cleanups without addressing cost, labor,
          permitting, maintenance, or timeline. Solutions sound exciting but lack any
          analysis of whether they can actually be carried out.
      - flaw: "Missing stakeholders in solution design"
        flaw_type: completeness
        mechanism: >
          Blind spot on stakeholder diversity. Solutions are framed as things "Memphis
          communities" can do, without identifying which specific communities are most
          affected (e.g., communities downstream, fishing communities, low-income
          neighborhoods near industrial discharge points) or who would need to be
          involved in implementation (city government, EPA, industrial actors).
      - flaw: "Ignored constraints on community action"
        flaw_type: completeness
        mechanism: >
          Does not account for regulatory, political, or resource constraints. Proposes
          policy changes (e.g., plastic bag bans, industrial regulations) as if community
          groups can directly enact them, without acknowledging the governmental and
          legislative processes required.

  - name: Tomas
    role: Community Researcher and Synthesizer
    knowledge_focus: >
      Tomas researched existing Memphis cleanup efforts and community organizations. He
      knows about a few local events (e.g., annual river cleanups) and can describe them
      well. However, his understanding of why these efforts have limited impact is shallow —
      he knows cleanups happen but assumes they are effective without examining evidence of
      their actual results. He has a blind spot on the tradeoffs of different intervention
      approaches (cleanup vs. prevention vs. policy) and tends to present all efforts as
      equally worthwhile.
    disposition_sketch: >
      Low confidence, collaborative. Tomas is earnest and wants the presentation to feel
      unified, but hedges his claims with "I think" and "probably," which makes his
      unsupported leaps less obvious to catch.
    expected_flaws:
      - flaw: "Missing premise connecting cleanups to ecological outcomes"
        flaw_type: reasoning
        mechanism: >
          Shallow understanding of cleanup effectiveness leads Tomas to assert that
          community cleanups help fish populations without explaining the causal chain —
          how much plastic do cleanups actually remove relative to what enters the river,
          and does removal at the macro level affect microplastic concentrations that
          harm fish? The premise connecting action to outcome is absent.
      - flaw: "Unaddressed tradeoffs between intervention approaches"
        flaw_type: completeness
        mechanism: >
          Blind spot on comparative analysis of interventions. Presents cleanup events,
          prevention campaigns, and policy advocacy as a simple list of good things to do,
          without examining tradeoffs — that cleanup is reactive while prevention is
          proactive, that policy change is slow but systemic, or that resources spent on
          one approach cannot be spent on another.

notes: >
  This scenario emphasizes reasoning and completeness flaws. Reasoning flaws are concentrated
  in the Introduction (Amara) and Findings (Jordan) sections, where misconceptions and
  shallow understanding lead to logical gaps and overgeneralizations. Completeness flaws are
  concentrated in the Solution (Keiko) and Conclusion (Tomas) sections, where blind spots
  on feasibility, stakeholders, and tradeoffs leave critical gaps. Jordan bridges both
  categories with his unaddressed research limitations.

  Amara's confident, expressive framing sets up expectations that later sections do not
  fully support — her misconception about pollution sources (individual littering) may
  clash with Jordan's research data (which implicitly reflects systemic sources), creating
  conditions for a coherence flaw to emerge naturally even though coherence is not a
  primary emphasis. Similarly, Keiko's solutions may not clearly connect to the specific
  ecological mechanisms Jordan describes, since she designed solutions around visible
  pollution while Jordan's findings focus on microplastics.

  Tomas's low confidence and hedging language make his reasoning flaws subtler and harder
  for students to identify, providing a useful contrast with Keiko's and Amara's more
  obvious gaps. This gives evaluating students a range of difficulty levels.

  Presentation section assignments: Amara (Introduction), Jordan (Findings), Keiko
  (Solution), Tomas (Approach and Conclusion). The Approach section allows Tomas to
  describe the team's research process, and the Conclusion lets him attempt synthesis
  where his blind spots on tradeoffs will be most visible.
