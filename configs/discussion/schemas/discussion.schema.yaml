# Discussion Transcript Schema
# Validates discussion transcript YAML documents

type: object
required:
  - scenario_id
  - topic
  - activity
  - created_at
  - agents
  - config
  - turns

properties:
  scenario_id:
    type: string
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"

  topic:
    type: string

  activity:
    type: string
    enum: [discussion]

  created_at:
    type: string
    format: date-time

  agents:
    type: array
    items:
      type: object
      required: [agent_id, name]
      properties:
        agent_id:
          type: string
        name:
          type: string
        role:
          type: [string, "null"]

  config:
    type: object
    required: [current_stage, selection]
    properties:
      current_stage:
        type: string
        enum: [opening_up, working_through, converging]
      selection:
        type: string
        enum: [responsive, round_robin]
      max_turns:
        type: [integer, "null"]

  turns:
    type: array
    items:
      type: object
      required: [turn_id, speaker, stage, content, metadata, added_at]
      properties:
        turn_id:
          type: string
          pattern: "^turn_\\d{3}$"
        speaker:
          type: string
        role:
          type: [string, "null"]
        stage:
          type: string
          enum: [opening_up, working_through, converging]
        content:
          type: string
        metadata:
          type: object
          required: [knowledge_areas_engaged, reactive_tendency_activated, rationale]
          properties:
            knowledge_areas_engaged:
              type: array
              items:
                type: object
                required: [area, category]
                properties:
                  area:
                    type: string
                  category:
                    type: string
                    enum: [strong, shallow, misconception, blind_spot]
            reactive_tendency_activated:
              type: boolean
            rationale:
              type: string
        added_at:
          type: string
          format: date-time
