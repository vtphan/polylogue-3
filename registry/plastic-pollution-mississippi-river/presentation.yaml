  - section_id: section_01
    section: introduction
    speaker: amara
    role: "Problem Framer"
    content: |
      Hi everyone, my name is Amara, and our group has been researching one of the biggest threats to our environment right here in Memphis -- plastic pollution in the Mississippi River. Our driving question is: How does plastic pollution in the Mississippi River affect local fish populations, and what can Memphis communities do to reduce it? I want to start by telling you just how serious this problem really is, because once you hear the numbers, you will never look at a plastic bottle the same way again.

      Every single year, over 8 million metric tons of plastic end up in our oceans. That is like dumping a garbage truck full of plastic into the ocean every single minute. And you have probably heard of the Great Pacific Garbage Patch -- it is a massive floating island of trash in the Pacific Ocean that is twice the size of Texas. Twice the size of Texas! And here is the thing that really gets me: plastic takes 400 to 1,000 years to decompose. So every piece of plastic that has ever been made is basically still out there somewhere.

      Now, what does this have to do with Memphis? Well, we live right on the Mississippi River, one of the biggest rivers in the entire country. And people are throwing plastic into it every single day. You can walk along the riverbank and see bottles, bags, wrappers, styrofoam containers -- just tossed there like the river is a trash can. People throw stuff off the bridges, leave garbage after picnics, and it all ends up in the water. That is how plastic gets into the Mississippi -- people just litter, plain and simple. And whether it is a big plastic bag or tiny little pieces called microplastics, it is all the same problem, just different sizes. The big pieces break down into the small pieces eventually anyway.

      And this is not just about ugly trash floating in the water. This is about real, living creatures being hurt. Sea turtles eat plastic bags because they look like jellyfish. Birds get tangled in six-pack rings and cannot fly or eat. Fish swallow tiny plastic pieces thinking they are food. Right here in our river, the fish that people catch and eat could have plastic inside them. That should scare all of us.

      Our team has spent weeks researching this problem from every angle. We looked at the science behind how plastic hurts fish, we explored what local communities and organizations are already doing to fight back, and we came up with ideas for solutions that real people in Memphis can actually use. We are going to walk you through everything we found, and by the end, we hope you will want to be part of the solution too.
