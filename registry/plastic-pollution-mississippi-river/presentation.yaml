  - section_id: section_03
    section: findings
    speaker: jordan
    role: "Science Researcher"
    content: |
      Hello, I am Jordan, and I am going to share what the science tells us about microplastics and fish in the Mississippi River. I want to focus on the actual research and data, because I think the numbers really speak for themselves.

      First, let me clarify what microplastics are. Microplastics are plastic particles smaller than 5 millimeters. They come in different forms -- fibers from synthetic clothing, fragments from larger plastics breaking down, and microbeads from personal care products like face wash and toothpaste. These are the types of plastics researchers are finding in our waterways.

      Studies on fish in the Mississippi River near Memphis have found microplastics in multiple species. Researchers examined channel catfish, largemouth bass, and freshwater drum, and they found an average of 12 to 15 microplastic particles per fish. That means almost every fish they tested had plastic inside it. The most common types found were fibers and fragments, which makes sense given their sources.

      The research also shows that microplastics cause real harm to fish. Studies have documented reduced growth rates in fish exposed to microplastics, as well as liver inflammation and changes in behavior. So it is not just that the fish have plastic in them -- the plastic is actually making them sick. And through bioaccumulation, these plastics build up as you go up the food chain. Smaller fish eat the plastics, then bigger fish eat those smaller fish, and the concentration of plastics keeps increasing at each level. So a top predator like a largemouth bass could have much higher concentrations than a small minnow.

      There are also studies showing that the types of plastic matter. Different polymers can carry different chemical pollutants, and those chemicals can leach into the fish tissue. Research has found evidence of endocrine disruption and immune system effects in fish populations exposed to high concentrations of microplastics.

      So overall, the data is very clear: microplastics are present in Mississippi River fish near Memphis, they are found in significant quantities, and they cause documented health effects. This is not just a pollution problem -- it is a direct threat to the fish populations in our river and potentially to anyone who eats those fish.
