  - section_id: section_05
    section: conclusion
    speaker: tomas
    role: "Community Researcher and Synthesizer"
    content: |
      Okay, so I am going to try to wrap everything up for us. I think our team did a really good job covering this topic from a lot of different directions.

      So to summarize what we found: plastic pollution in the Mississippi River is a really serious problem. There are tons of plastics getting into the river, and the science shows that fish near Memphis -- like catfish and bass -- actually have microplastics inside them, which is causing health problems for the fish. And that probably is not great for people who eat those fish either, although I am not sure we looked into that part as much as we maybe should have.

      On the community side, there are already some great organizations doing cleanups. Living Lands & Waters does their big annual cleanup and collects thousands of pounds of trash. The Memphis Sierra Club does quarterly pickups. The Wolf River Conservancy is doing good work too. These groups get hundreds of volunteers out there every year, and they are removing a lot of plastic from the waterways. So that is really encouraging, and I think it shows that cleanups, along with the technology solutions and policy ideas that Keiko talked about, can all make a real difference.

      I guess if I had to say what our limitations are, I would say we probably could have spent more time looking at whether our solutions would actually be enough to solve the problem. Like, the river is really big, and there is a lot of plastic. But I think the fact that people are already out there doing this work is a good sign.

      Going back to our driving question -- how does plastic pollution affect fish and what can Memphis do about it -- I think we showed that it definitely does affect fish, and there are a lot of things Memphis can do, from cleanups to campaigns to new policies. Maybe no single thing is going to fix it completely, but if we do all of them together, we can probably make a big difference. Thank you all for listening to our presentation.
