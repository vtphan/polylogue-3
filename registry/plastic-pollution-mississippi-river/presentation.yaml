  - section_id: section_02
    section: approach
    speaker: tomas
    role: "Community Researcher and Synthesizer"
    content: |
      Hey everyone, I am Tomas, and I am going to talk about how our team went about researching this project. I think we had a pretty good process, though I am sure there is stuff we could have done better.

      So basically, we split up the work based on what each person was interested in. Amara took the lead on framing the problem because she is really good at finding those big attention-grabbing facts. Jordan focused on the science side -- reading studies about microplastics and fish. Keiko worked on coming up with solutions, because she is always full of ideas. And I focused on the community side, looking into what organizations in Memphis are already doing about this problem.

      For my part, I spent a lot of time researching local cleanup efforts. I looked into groups like Living Lands & Waters, which does a big annual cleanup on the Mississippi, and the Memphis Sierra Club, which organizes quarterly river pickups. I also learned about the Wolf River Conservancy and what they do to keep waterways clean. I tried to find out how they recruit volunteers, how they organize the actual events, and what kind of data they collect about the trash they pick up. I think that kind of on-the-ground information is probably just as important as the science stuff, because it shows what people are actually doing.

      We also did some general research online -- reading articles, watching videos, and looking at websites from environmental organizations. We tried to find sources that were specifically about the Mississippi River and Memphis, not just plastic pollution in general. I think that was a good choice, even though it was harder to find local information sometimes. We wanted our project to really be about our community, not just a report about plastic pollution anywhere.

      I think one strength of our approach is that we covered a lot of different angles -- the science, the community action, and the solutions. We probably could have done more to connect those pieces together while we were researching, but I think each person did a really thorough job on their part.
