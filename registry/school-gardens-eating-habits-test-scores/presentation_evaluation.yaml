  key_patterns: 'The presentation''s central weakness is a chain of epistemic flaws:
    a small, uncontrolled study with self-report data is presented as conclusive,
    and a single news article''s correlational finding is treated as causal proof
    that gardens improve test scores. These epistemic gaps compound into coherence
    flaws at the presentation level, where Destiny stitches together two unrelated
    evidence streams into a unified causal narrative that neither source actually
    supports. The result is a conclusion that dramatically overstates what the evidence
    can bear, claiming gardens are among the best school investments for health and
    academics based on 12 surveys and one article.'
