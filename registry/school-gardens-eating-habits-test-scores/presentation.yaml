- section_id: section_03
  section: findings
  speaker: aisha
  role: Data Analyst
  content: 'I''m going to walk you through what we found in our survey data. I organized
    all the responses from our 12 participants and calculated the percentages so you
    can see exactly what changed between the before survey and the after survey.


    The biggest finding was about vegetables. Before the garden program, only 33%
    of students — that''s 4 out of 12 — said they ate two or more servings of vegetables
    per day. After the 3 weeks in the garden, that number went up to 75%, which is
    9 out of 12. So 42% more students were eating vegetables regularly after working
    in the garden. I made a bar chart comparing the before and after numbers, and
    you can really see the jump.


    We also saw changes in other areas. Before the program, 58% of students said they
    ate fast food three or more times a week. After, that dropped to 33%. And for
    fruit, 50% of students said they ate fruit daily before, and that went up to 67%
    after. So across the board, students were eating healthier after the garden program.


    I want to point out that the data is pretty clear here. We asked students directly
    about their eating habits, they told us what changed, and the numbers show a consistent
    pattern — more vegetables, more fruit, less fast food. When you look at all three
    categories together, every single one moved in the healthier direction. That''s
    not a coincidence. The data shows that students genuinely changed their eating
    habits because of the garden.


    I put all of this into a table and a chart so you can see the exact numbers. I
    double-checked all the percentages to make sure the math was right. The results
    speak for themselves — the garden program made a real difference in what students
    eat.'
