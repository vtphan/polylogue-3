- section_id: section_05
  section: conclusion
  speaker: destiny
  role: Synthesizer & Presenter
  content: 'So to wrap everything up — our group set out to answer one question: do
    school gardens actually improve students'' eating habits and test scores? And
    based on everything we''ve found, the answer is yes.


    Marcus showed you how we designed a real scientific study with before-and-after
    surveys to track changes. Aisha showed you the data, and the numbers are clear
    — students who worked in the garden started eating significantly more vegetables
    and fruit, and they cut back on fast food. And Kenji showed you that this isn''t
    just something happening at our school. Research from around the country shows
    that schools with gardens have students who perform better on tests. So the evidence
    lines up from multiple directions.


    What''s really cool about our project is that we didn''t just rely on one piece
    of evidence. We have our own original data showing that gardens change eating
    habits, and we have outside research showing that gardens are connected to better
    test scores. When you put those two things together, it paints a really strong
    picture. Gardens help students eat healthier, and healthier students do better
    in school. It''s all connected.


    Based on our findings, we believe our school should expand the garden program
    so that more students can benefit. If 12 students showed this much improvement
    in just 3 weeks, imagine what could happen if the whole school participated for
    a full semester. The evidence suggests that school gardens are one of the best
    things a school can invest in for both student health and academic success.


    Thank you for listening to our presentation. We hope you can see why we''re so
    passionate about this. The data supports it, the research supports it, and we
    think every student deserves the chance to experience what a school garden can
    do for them.'
