- section_id: section_01
  section: introduction
  speaker: destiny
  role: Synthesizer & Presenter
  content: 'Have you ever wondered if something as simple as a garden could actually
    change how students eat and even how they do in school? That''s the question our
    group set out to answer. We wanted to know: do school gardens actually improve
    students'' eating habits and test scores? It''s a really important question because
    a lot of schools are thinking about starting garden programs, and we wanted to
    find out if they''re really worth it.


    Our team designed a study to test this. We had 12 students work in our school
    garden for 3 weeks, and we gave them a survey before and after to see if their
    eating habits changed. We also did some research and found out that schools with
    garden programs tend to have students who score higher on tests. So we have evidence
    from two different angles — our own study about eating habits, and outside research
    about academic performance.


    For our presentation today, Marcus is going to walk you through how we designed
    our study and why we set it up the way we did. Then Aisha will show you the actual
    data from our surveys — the numbers that show what changed. After that, Kenji
    will share what he found about the connection between school gardens and test
    scores from his research. And I''ll wrap everything up at the end and talk about
    what it all means.


    We''re really proud of this project because we didn''t just look up information
    — we actually collected our own data and combined it with what other people have
    found. We think our results show something really meaningful about how school
    gardens can help students, and we''re excited to share what we learned.'
