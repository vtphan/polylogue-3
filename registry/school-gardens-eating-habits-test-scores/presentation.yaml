- section_id: section_02
  section: approach
  speaker: marcus
  role: Study Designer
  content: 'So I was in charge of designing how our study would work, and I wanted
    to make sure we did this the right way — like an actual experiment, not just guessing.
    The most important thing I knew we needed was a before-and-after comparison. If
    we only surveyed students after they worked in the garden, we wouldn''t know if
    anything actually changed. Maybe they already ate a lot of vegetables before.
    So the whole point of our design was to measure the same students at two different
    time points so we could see the difference.


    We had 12 students participate in our study. They all signed up to work in the
    school garden for 3 weeks. Before they started, we gave them a survey asking about
    what foods they eat — like how often they eat vegetables, fruit, fast food, and
    snacks. Then after the 3 weeks of working in the garden, we gave them the same
    exact survey again. That way we could compare their answers and see if anything
    shifted.


    For the survey itself, I spent a lot of time thinking about how to write the questions.
    We went with multiple choice instead of open-ended questions because it''s way
    easier to compare the answers when everyone picks from the same options. Like,
    instead of asking "what do you eat for lunch" and getting a million different
    answers, we asked "how many servings of vegetables do you eat per day" and gave
    them ranges to pick from. That made it much cleaner to analyze.


    The 3-week timeline worked well because it gave students enough time to actually
    get involved in the garden and start seeing things grow. It also fit into our
    school schedule, which was important since we had to do this during the semester.
    Twelve students was a solid number — it was everyone who wanted to participate,
    and it gave us enough responses to see a clear pattern in the data.


    Since we measured the same students before and after, and the garden program was
    the thing that happened in between, any changes we see in their eating habits
    are from the garden. That''s the logic of a before-and-after study — you control
    for the person by comparing them to themselves. So when Aisha shows you the data,
    you''ll see that the changes are real because our design makes sure of that.'
