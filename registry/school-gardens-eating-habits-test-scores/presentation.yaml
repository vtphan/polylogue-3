- section_id: section_04
  section: solution
  speaker: kenji
  role: Background Researcher
  content: 'Okay so here''s where it gets really exciting. Our group''s study showed
    that the garden changes what students eat — but I found something that takes this
    even further. I did research outside of our own study, and I found a news article
    that says schools that have garden programs actually have higher test scores.
    Like, not just a little higher — the article said there''s a clear connection
    between having a school garden and students doing better academically.


    Think about that for a second. Gardens don''t just help with nutrition — they
    actually help kids do better in school. The article I found was reporting on what
    researchers discovered when they looked at schools across the country. Schools
    with gardens had students who scored higher on standardized tests. That''s huge.
    It means gardens aren''t just about growing tomatoes — they''re about growing
    better students.


    So our recommendation — our solution — is that our school should expand the garden
    program and make it available to every student, not just 12. If gardens improve
    eating habits, which our study showed, AND they improve test scores, which the
    research shows, then there''s really no reason not to do this. It''s basically
    a two-for-one deal. Students eat better and they do better in class.


    I also think other schools in Memphis should look into starting their own garden
    programs. If the evidence shows that gardens lead to higher test scores, then
    this is something that could help students everywhere, not just at our school.
    The article I found was talking about schools all over the place, so this isn''t
    just something that works in one specific situation — it''s a pattern that shows
    up everywhere gardens are used.


    Honestly, when I found this article, I was like, this is the strongest piece of
    evidence we have. Our survey data is great, but the test score connection is what
    really proves that gardens are worth investing in. It shows that the benefits
    go way beyond just eating a few more vegetables.'
