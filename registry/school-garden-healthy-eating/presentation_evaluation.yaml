  key_patterns: 'The presentation''s central weakness is a pattern of narrow evidence
    treated as comprehensive proof — two articles and one garden visit are framed
    as ''studies show'' and ''research proves,'' and this inflation compounds across
    sections until the conclusion claims the garden will transform school culture
    for life. The solution section has a major completeness gap: no feasibility analysis
    (cost, space, maintenance, seasonal constraints) and missing stakeholders beyond
    the cafeteria manager, whose enthusiasm is treated as institutional support. For
    6th graders, the most accessible flaws are the concrete omissions (no cost, no
    plan for summer, only one person interviewed) and the visible gap between the
    modest findings and the sweeping conclusion.'
