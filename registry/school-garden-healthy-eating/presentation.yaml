- section_id: section_03
  section: findings
  speaker: mia
  role: Researcher
  content: 'Okay so now I''m going to tell you about what we actually found in our
    research. I read two really good articles about school gardens — one was about
    a program in California and the other was about one in Vermont. Both of them showed
    that when schools started gardens, the students who worked in them ate more vegetables
    and were more willing to try new foods. The California one said that students
    in the garden program ate like 30 percent more vegetables than students who weren''t
    in the program. And the Vermont one talked about how kids who grew their own lettuce
    and tomatoes actually asked for salads at lunch, which is kind of amazing if you
    think about it.


    I also got to visit a real community garden here in Memphis, and it was really
    cool. They had raised beds with tomatoes, peppers, and squash growing in them.
    There were volunteers working there, and they had a sign that said the produce
    goes to a local food bank. So the garden wasn''t just growing food for fun — it
    was actually helping feed people in the community. That''s basically the same
    idea we have for our school, except the food would go to the cafeteria for our
    lunches.


    What I learned from all of this is that school gardens are proven to work. The
    research shows that when students are involved in growing food, it changes how
    they think about eating. It''s called farm-to-table, and it''s basically the idea
    that when you know where your food comes from and you helped grow it yourself,
    you''re going to want to eat it more. That''s food literacy — understanding the
    connection between the food you eat and where it comes from.


    So based on everything I found, I think the evidence is really clear. School gardens
    in other states have already shown that this works, and we saw a working garden
    right here in Memphis. There''s no reason it wouldn''t work at our school too.
    The research proves that gardens help kids eat healthier, and that''s exactly
    what our school needs.'
