- section_id: section_02
  section: approach
  speaker: sofia
  role: Synthesizer
  content: 'So for this project, our group wanted to figure out the best way to research
    whether a school garden would actually help students eat healthier. We knew we
    couldn''t just say it was a good idea without backing it up, so we divided the
    work into different parts so each person could focus on something specific.


    Mia was in charge of the research part. She found articles about school gardens
    that have already been done in other places, and she also went and visited a community
    garden here in Memphis to see what a real garden looks like. So she was able to
    bring us information from actual programs that worked, plus what she saw in person.
    That gave us a really solid foundation for our project because it showed us that
    gardens really do help students learn about food and nutrition.


    Jayden was our community liaison, which means he was the one who went out and
    talked to people at our school about the idea. He interviewed the cafeteria manager,
    and she had a lot of really great things to say about wanting fresh vegetables
    and how students would benefit from growing their own food. So that was our way
    of getting the school''s perspective on the whole thing.


    And then my job was to take everything Mia and Jayden found and organize it into
    this presentation. I made sure we had a clear structure — like, an introduction
    to explain what we''re doing, then our findings, our solution, and a conclusion
    to tie it all together. I think our approach was really thorough because we looked
    at it from multiple angles. We had the research side, the real-world visit, and
    the school community side, so we covered all our bases.'
