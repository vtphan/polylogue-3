- section_id: section_01
  section: introduction
  speaker: mia
  role: Researcher
  content: 'Hi everyone, my name is Mia and our group has been working on a really
    important question — should our school start a garden to teach students about
    healthy eating? We think this is something that could really make a difference
    for our school, and we''re excited to share what we found out.


    So the reason we picked this topic is because a lot of kids at our school don''t
    really know that much about where their food comes from or why eating healthy
    matters. Like, we all eat lunch in the cafeteria every day, but most of us just
    grab whatever''s there without thinking about it. We started wondering — what
    if there was a way to get students to actually care about eating vegetables and
    trying new foods? That''s when we found out about school gardens.


    Studies show that school gardens are one of the best ways to teach kids about
    nutrition and healthy eating. The research proves that when students grow their
    own food, they''re way more likely to eat it and make better food choices. We
    read articles about real school garden programs in other states and they all showed
    the same thing — gardens work. We also visited an actual community garden right
    here in Memphis, so we''ve seen it with our own eyes.


    For our project, we did a bunch of research. I read two articles about school
    gardens that were really successful, and I went and visited a community garden
    in Memphis. Jayden interviewed our school cafeteria manager to find out what she
    thought about the idea. And Sofia helped us put everything together into this
    presentation. So today we''re going to walk you through what we found, how we
    think the garden should work, and why we believe this is something our school
    should definitely do.'
