- section_id: section_04
  section: solution
  speaker: jayden
  role: Community Liaison
  content: 'Alright so now I get to tell you about our solution, which is the exciting
    part. Our group is recommending that our school builds a garden where students
    can grow vegetables and learn about healthy eating. And I know this might sound
    like just an idea, but I actually talked to someone at our school who thinks this
    could really happen.


    I interviewed our cafeteria manager, Ms. Johnson, and she was SO into this idea.
    Like, when I told her about what we were thinking, her face just lit up. She said
    she would love to have fresh vegetables from a school garden because right now
    a lot of the vegetables in the cafeteria come frozen or from cans. She told me
    that if students grew their own tomatoes and lettuce and stuff, she could actually
    use those in the salad bar and in some of the lunch recipes. She even said she
    used to work at a school that had a small herb garden, so she''s already seen
    something like this work before. She said the students at that school were so
    proud of the herbs they grew and they actually wanted to eat the food that had
    their herbs in it.


    So basically our plan is that the school would build a garden — like with raised
    beds and everything — and students would help plant and take care of the vegetables.
    Then when the vegetables are ready, they go straight to the cafeteria so everyone
    gets to eat fresh, healthy food. Ms. Johnson said she thinks students would be
    way more excited to eat food they actually grew themselves, and I totally agree
    with her. When you put work into something, you care about it more.


    The cool thing is that the cafeteria manager is already on board, which means
    the school is pretty much ready to support this. She works there every day, she
    knows the students, and she''s saying yes — so that tells us this is something
    the school wants to do. We think if we can get this garden started, it''s going
    to change how students at our school think about food.'
