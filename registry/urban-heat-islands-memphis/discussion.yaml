- turn_id: turn_001
  speaker: zara
  role: Heat Science Researcher
  stage: opening_up
  content: So I've been studying the Memphis temperature maps pretty closely, and
    there are some neighborhoods that are way hotter than others -- South Memphis,
    Whitehaven, parts of downtown are all running significantly higher than areas
    near Overton Park. And honestly, the biggest reason is all the waste heat we're
    pumping into those areas -- you've got cars running on every major road, AC units
    blasting hot air outside, and when you look at the maps, the hottest spots line
    up almost exactly with the busiest highways and roads. Cities run like 5 to 10
    degrees hotter than the countryside, and I think a lot of that comes down to all
    that machinery running nonstop.
