- section_id: section_02
  section: approach
  speaker: kayla
  role: Experiment Designer
  content: 'So now I am going to walk you through how we actually designed and ran
    our experiment. I led the experiment design for our team, and I want to show you
    how we made sure everything was set up to give us reliable results.


    We tested three different sound conditions: pop music played through a Bluetooth
    speaker at medium volume, complete silence, and a white noise machine. We set
    up three separate rooms, one for each condition, and we closed the doors between
    rooms so the sounds would not bleed over. Each room had the exact same setup —
    a desk, the test materials, a timer, and a pencil. The only thing that was different
    between the rooms was the sound condition. That is what makes this a controlled
    experiment — we kept everything the same except for the one thing we were testing,
    which was the type of sound.


    For the tasks, we used two types of tests. The first was a 20-item memory recall
    test. Students studied a word list for two minutes and then wrote down as many
    words as they could remember. The second task was a timed math worksheet with
    30 multiplication and division problems. Every student in every condition got
    the same exact word list and the same exact math problems. We timed each session
    to exactly 15 minutes, and we used a stopwatch to make sure it was consistent
    across all three rooms.


    We tested 24 students total — about 8 in each condition. Students signed up for
    whatever testing slot worked with their schedule, and they did not know ahead
    of time which room had which sound condition. So there was no bias in how people
    ended up in their groups. They just showed up, took the tests, and we recorded
    their scores.


    I am really proud of how clean this experiment was. We kept the speaker volume
    settings identical, we used the same tasks across the board, and we made sure
    every session ran for the same amount of time. When you have a controlled experiment
    like this, you can be confident that any differences you see in the results are
    because of the sound condition and not because of something else. That is exactly
    what we were going for.'
