- section_id: section_04
  section: solution
  speaker: malik
  role: Solutions Designer and Synthesizer
  content: 'So now that you have seen the research, the experiment, and the data,
    it is time to talk about what it all means and what we are recommending. That
    is my job — I pulled together everything our team found and turned it into an
    actual solution that students can use.


    Our recommendation is clear: if you want to perform your best on schoolwork, you
    should study in silence. The data from our experiment showed that students in
    the silence condition scored higher on both the memory task and the math task
    compared to students who had music or white noise in the background. Silence beat
    music by 6 points on memory and 7 points on math. Those are real differences,
    and they came out of a controlled experiment that our team designed and ran ourselves.
    So this is not just something we read online — this is something we tested and
    proved.


    Based on these findings, our team designed a prototype for an optimal study environment.
    The idea is simple: a designated quiet study space where students can work without
    any background sound. We are picturing a room or a section of the library where
    the rule is silence — no music, no talking, no phone sounds. You walk in, you
    sit down, and you focus. We made a digital mockup showing what this could look
    like, with partitions between desks, a noise-level indicator on the wall, and
    signs reminding students to keep it quiet.


    Now, I know what some of you are thinking — "But I study better with music on!"
    And I get that. Everyone has their preferences. But here is the thing: the data
    showed that music was actually the worst condition for both types of tasks we
    tested. So even if it feels like music is helping, the numbers suggest it might
    be hurting your performance. Sometimes what feels comfortable is not the same
    as what is actually effective. That is one of the big takeaways from this project.


    We want every student at UMS to have access to the best study conditions possible,
    and based on our research and our experiment, that means creating spaces where
    students can work in silence. We think the school should invest in setting up
    dedicated quiet zones, especially during study hall and before tests. It is a
    straightforward recommendation backed by solid data.'
