- section_id: section_03
  section: findings
  speaker: deshawn
  role: Data Analyst
  content: 'Alright, so I handled the data analysis for our team, and I want to take
    you through what the numbers showed. I scored every test using the same answer
    key, double-checked my tallies, and calculated the averages for each condition.
    Here is what we found.


    On the memory recall task, the silence group averaged 74% accuracy. The white
    noise group came in at 71%, and the music group averaged 68%. So silence came
    out on top for memory, with a 6-percentage-point lead over music and a 3-point
    lead over white noise. That is a clear pattern — silence helped students remember
    the most words, music was the worst for memory, and white noise landed in between.


    On the math task, the results followed a similar pattern. Silence averaged 72%,
    white noise was at 70%, and the music group came in at 65%. That gives silence
    a 7-point advantage over music on math. So across both tasks, the silence condition
    outperformed the other two. The music group scored the lowest on both the memory
    test and the math test.


    When you look at the overall picture, the data tells a pretty straightforward
    story. Silence beat music by 6 points on memory and 7 points on math. White noise
    was closer to silence — only a 2-to-3-point difference — but it still did not
    match up. The numbers are consistent across both types of tasks, which makes the
    pattern more convincing. It is not like silence won on one task and lost on the
    other. It performed better on both.


    I put together bar charts to show the comparisons side by side, and you can see
    the differences clearly when you look at the bars. The silence bars are taller
    on both charts. I also calculated the percentage-point differences between each
    pair of conditions so we could be precise about how much better or worse each
    group did. The data does not leave a lot of room for debate — silence came out
    ahead, music came in last, and white noise was in the middle.'
