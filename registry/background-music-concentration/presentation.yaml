- section_id: section_05
  section: conclusion
  speaker: malik
  role: Solutions Designer and Synthesizer
  content: 'So to wrap everything up — our team tackled the question of how background
    music affects concentration and test performance, and I think we came away with
    a really strong answer. Priya showed us that this is a real scientific topic that
    researchers have been studying for decades. Kayla designed a solid experiment
    with three conditions so we could compare fairly. DeShawn crunched the numbers
    and showed us exactly where each group landed. And I brought it all together into
    a recommendation that students can actually use.


    The bottom line is this: silence is the best environment for studying. Our experiment
    proved that across two different kinds of tasks — memory and math — students performed
    better when there was no background sound. Music actually made performance worse,
    and white noise was somewhere in the middle but still did not beat silence. The
    research Priya found supports this too, because even though some scientists think
    music can help, the strongest evidence points toward sound being a distraction
    when you are trying to focus.


    If we were to do this project again, I think we would want to test even more conditions
    — maybe different types of music, like classical versus hip-hop, or different
    volume levels. That would give us even more data to work with and help us fine-tune
    the recommendation. But honestly, for the scope of a 7th grade project, I think
    we did a really thorough job.


    Our big takeaway for everyone here is simple: next time you sit down to study
    or prepare for a test, try turning off the music. I know it might not be what
    you want to hear, but the science and the data both point in the same direction.
    You will focus better, you will remember more, and you will do better on your
    tests. Creating a quiet study space is one of the easiest things a school or a
    student can do to improve academic performance, and we hope our findings help
    make that happen at UMS. Thank you for listening to our presentation!'
